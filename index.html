    <!-- Sky Wolf Studios embed contract — DO NOT EDIT. The portal frames games with ?embed=1. -->
    <script>
    (function(){
      var SWS_EMBED=/[?&]embed=1(&|$)/.test(location.search);
      window.SWS_EMBED=SWS_EMBED;
      window.SWS_EXIT=function(){
        if(SWS_EMBED&&parent!==window){try{parent.postMessage({sws:'close'},'*');}catch(e){} return;}
        location.href='https://lucidwinds.com/portal/';
      };
      if(SWS_EMBED&&parent!==window){try{parent.postMessage({sws:'ready'},'*');}catch(e){}}
    })();
    </script>

    <!-- PWA + Sky Wolf studio soundtrack + Add-to-Home-Screen (Jul 17) -->
    <script>
    (function(){
      try{
        if('serviceWorker' in navigator && /^https?:/.test(location.protocol)){
          window.addEventListener('load',function(){ navigator.serviceWorker.register('./sw.js')['catch'](function(){}); });
        }
      }catch(e){}
      var deferred=null;
      window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferred=e; });
      window.TallyInstall=function(){
        if(deferred){ deferred.prompt(); deferred=null; return; }
        var ios=/iphone|ipad|ipod/i.test(navigator.userAgent);
        alert(ios ? 'To add Tally to your Home Screen:\n\nTap the Share button, then Add to Home Screen.'
                  : 'To add Tally to your Home Screen:\n\nOpen the browser menu, then Add to Home Screen or Install.');
      };
      window.TallyStandalone=function(){ try{ return !!(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||!!window.navigator.standalone; }catch(e){ return false; } };
      /* studio soundtrack, streamed from lucidwinds.com (works on github.io too) */
      var musicReady=false;
      window.SWSMusicOpen=function(){
        if(window.SWS_EMBED){ return; }
        if(musicReady && window.SWS_MUSIC){ SWS_MUSIC.open(); return; }
        function load(src,cb){ var sc=document.createElement('script'); sc.src=src; sc.onload=cb; sc.onerror=cb; document.head.appendChild(sc); }
        function go(){
          try{
            if(window.LW_TRACKS){ for(var i=0;i<LW_TRACKS.length;i++){ if(LW_TRACKS[i].src && LW_TRACKS[i].src.charAt(0)==='/') LW_TRACKS[i].src='https://lucidwinds.com'+LW_TRACKS[i].src; } }
            var btn=document.getElementById('sws-music-proxy');
            if(window.SWSPlayer && btn){ SWSPlayer.init({button:btn}); musicReady=true; if(window.SWS_MUSIC)SWS_MUSIC.open(); }
          }catch(e){}
        }
        function withPlayer(){ if(window.SWSPlayer)go(); else load('https://lucidwinds.com/music-player.js',go); }
        if(window.LW_TRACKS)withPlayer(); else load('https://lucidwinds.com/music-tracks.js',withPlayer);
      };
    })();
    </script>

    <style>html, body, #root { height: 100%; } body { margin: 0; background: #f2e4cf; overscroll-behavior: none; }</style>
  </head>
  <body>
    <div id="root"></div>
    <button id="sws-music-proxy" style="display:none" aria-hidden="true"></button>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
